        // Distance Calculator Math
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = 
                Math.sin(dLat/2) * Math.sin(dLat/2) +
                Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2); 
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)); 
            return R * c; 
        }

        // Render Cards View
        function renderClinics(userLat = null, userLng = null) {
            const container = document.getElementById("clinicsContainer");
            const countLabel = document.getElementById("resultsCount");
            container.innerHTML = ""; 

            let listToRender = [...clinicsData];

            if (userLat && userLng) {
                listToRender.forEach(clinic => {
                    clinic.distance = calculateDistance(userLat, userLng, clinic.lat, clinic.lng);
                });
                listToRender.sort((a, b) => a.distance - b.distance);
                countLabel.innerHTML = "🟢 GPS Active: Showing nearest clinics to your position.";
            } else {
                countLabel.innerText = `Showing all ${listToRender.length} clinics in Kanpur.`;
            }

            listToRender.forEach(clinic => {
                const distanceString = clinic.distance ? `<span class="distance-badge">📍 ${clinic.distance.toFixed(1)} km away</span>` : '';
                
                const cardHTML = `
                    <div class="card clinic-card p-3 fade-in">
                        <div class="row align-items-center">
                            <div class="col-12 col-md-8">
                                <div class="d-flex align-items-center gap-2 flex-wrap mb-1">
                                    <h5 class="fw-bold text-primary mb-0">${clinic.name}</h5>
                                    ${distanceString}
                                </div>
                                <p class="text-secondary small mb-2">${clinic.address}</p>
                                <div class="text-dark small">
                                    ⏰ <strong>समय:</strong> <span class="text-success fw-medium">${clinic.timings}</span>
                                </div>
                            </div>
                            <div class="col-12 col-md-4 mt-3 mt-md-0 text-md-end">
                                <a href="${clinic.mapsUrl}" target="_blank" class="btn btn-map w-100 d-flex align-items-center justify-content-center gap-2">
                                    🗺️ Navigate (Google Maps)
                                </a>
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += cardHTML;
            });
        }

        // Location Detection Trigger
        function getLocation() {
            const countLabel = document.getElementById("resultsCount");
            if (navigator.geolocation) {
                countLabel.innerText = "Requesting GPS permission...";
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const lat = position.coords.latitude;
                        const lng = position.coords.longitude;
                        renderClinics(lat, lng);
                    },
                    (error) => {
                        countLabel.innerText = "❌ GPS Error: Location access denied. Please verify your smartphone settings.";
                    }
                );
            } else {
                countLabel.innerText = "❌ Browser doesn't support automatic location.";
            }
        }

        window.onload = function() { renderClinics(); };
    </script>
